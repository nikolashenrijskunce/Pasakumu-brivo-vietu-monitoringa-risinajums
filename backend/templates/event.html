<!DOCTYPE html>
<html>

<head>

    <title>{{ event.name }}</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body>

<div class="container mt-5">

    <a href="/" class="btn btn-secondary mb-4">
        Back
    </a>

    <div class="card">

        <div class="card-body">

            <h1>{{ event.name }}</h1>

            <p>
                <strong>City:</strong>
                {{ event.city }}
            </p>

            <p>
                <strong>Available tickets:</strong>
                {{ event.availability }}
            </p>

            <p>
                <strong>Price:</strong>
                €{{ event.price }}
            </p>

        </div>

    </div>

</div>

</body>
</html>
