<!DOCTYPE html>
<html>
<head>
    <title>Ticket Availability</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="container mt-4">
    <h1 class="mb-4">Ticket Availability Dashboard</h1>
    <!-- Meklesana -->
    <input type="text" id="searchInput" class="form-control mb-4" placeholder="Search events..." >
    <!-- Saraksts kvadratu forma -->
    <div class="row" id="eventContainer">

        {% for event in events %}
        <div class="col-md-4 mb-4 event-card">
            <div class="card shadow-sm h-100">
                <div class="card-body">

                    <h4 class="card-title">{{ event.name }}</h4>
                    <p><strong>City:</strong>{{ event.city }}</p>
                    <p><strong>Available tickets:</strong>{{ event.availability }}</p>
                    <p><strong>Price:</strong>€{{ event.price }}</p>
                    <a href="/event/{{ event.id }}" class="btn btn-primary">View Details</a>

                </div>
            </div>
        </div>
        {% endfor %}

    </div>
</div>
<script src="/static/script.js"></script>
</body>
</html>
