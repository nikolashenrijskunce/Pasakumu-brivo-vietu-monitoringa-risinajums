version: "3.9"

services:

  scraper:
    build: ./scraper
    container_name: scraper
    restart: always
    environment:
      DB_HOST: Postgresql
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: jojosiwa
      DB_PORT: 5432
    networks:
      - scraper-network

  backend:
    build: ./backend
    container_name: backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_HOST: Postgresql
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: jojosiwa
      DB_PORT: 5432
    networks:
      - scraper-network

networks:
  scraper-network:
    external: true